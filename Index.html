<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mobile Invoice Generator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root {
      --bg: #f4f6f8;
      --card: #ffffff;
      --text: #17202a;
      --muted: #687385;
      --line: #dfe5ec;
      --primary: #0f766e;
      --primary-dark: #115e59;
      --danger: #c2410c;
      --soft: #ecfdf5;
      --soft-blue: #eff6ff;
      --shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      line-height: 1.4;
    }

    .app {
      max-width: 760px;
      margin: 0 auto;
      padding: 16px;
      padding-bottom: 120px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(244, 246, 248, 0.95);
      backdrop-filter: blur(12px);
      padding: 14px 0 10px;
    }

    h1 {
      margin: 0 0 4px;
      font-size: 24px;
      letter-spacing: -0.04em;
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
      margin: 0;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 14px;
    }

    .tab {
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .tab.active {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }

    .section { display: none; }
    .section.active { display: block; }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      margin: 14px 0;
    }

    .card h2 {
      margin: 0 0 12px;
      font-size: 18px;
      letter-spacing: -0.02em;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    @media (min-width: 640px) {
      .grid.two { grid-template-columns: repeat(2, 1fr); }
      .grid.three { grid-template-columns: repeat(3, 1fr); }
    }

    label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 6px;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      font-size: 16px;
      background: white;
      color: var(--text);
      outline: none;
    }

    textarea { min-height: 72px; resize: vertical; }

    input:focus, select:focus, textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.12);
    }

    .row-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      min-height: 44px;
    }

    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-secondary { background: #e2e8f0; color: #0f172a; }
    .btn-danger { background: #ffedd5; color: var(--danger); }
    .btn-wide { width: 100%; }

    .item-card {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 16px;
      padding: 14px;
      margin: 10px 0;
    }

    .item-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .item-title {
      margin: 0;
      font-weight: 800;
      font-size: 15px;
    }

    .badge {
      display: inline-block;
      border-radius: 999px;
      padding: 5px 9px;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .badge.monthly { background: var(--soft); color: #047857; }
    .badge.nonmonthly { background: var(--soft-blue); color: #1d4ed8; }

    .mini-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-top: 12px;
    }

    .mini {
      background: #f8fafc;
      border-radius: 12px;
      padding: 9px;
    }

    .mini span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .mini strong {
      display: block;
      margin-top: 2px;
      font-size: 14px;
    }

    .totals {
      display: grid;
      gap: 8px;
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px dashed var(--line);
      padding: 8px 0;
    }

    .total-row:last-child { border-bottom: 0; }
    .total-row strong { font-size: 17px; }
    .grand {
      background: #0f172a;
      color: white;
      border-radius: 16px;
      padding: 14px;
      margin-top: 10px;
    }

    .grand .total-row { border-color: rgba(255,255,255,0.18); }

    .bottom-actions {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 20;
      background: rgba(244, 246, 248, 0.95);
      border-top: 1px solid var(--line);
      backdrop-filter: blur(12px);
      padding: 10px 16px 16px;
    }

    .bottom-inner {
      max-width: 760px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .empty {
      color: var(--muted);
      background: #f8fafc;
      border: 1px dashed var(--line);
      border-radius: 16px;
      padding: 18px;
      text-align: center;
    }

    .saved-card {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      background: #fff;
      margin: 10px 0;
    }

    .saved-card h3 {
      margin: 0 0 6px;
      font-size: 16px;
    }

    .saved-meta {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 10px;
    }

    .notice {
      background: #fff7ed;
      color: #9a3412;
      border: 1px solid #fed7aa;
      border-radius: 16px;
      padding: 12px;
      font-size: 14px;
      margin: 12px 0;
    }

    .success {
      background: #ecfdf5;
      color: #047857;
      border: 1px solid #a7f3d0;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <h1>Invoice Generator</h1>
      <p class="subtitle">GST 10% · SUPER 12% · Mobile PDF export</p>
      <div class="tabs">
        <button class="tab active" onclick="showTab('create')">Create</button>
        <button class="tab" onclick="showTab('history')">Saved</button>
        <button class="tab" onclick="showTab('analysis')">Analysis</button>
      </div>
    </div>

    <section id="create" class="section active">
      <div id="message"></div>

      <div class="card">
        <h2>Invoice Details</h2>
        <div class="grid two">
          <div>
            <label>Invoice Number</label>
            <input id="invoiceNumber" type="text" placeholder="60" />
          </div>
          <div>
            <label>Invoice Date</label>
            <input id="invoiceDate" type="date" />
          </div>
          <div>
            <label>Due Date</label>
            <input id="dueDate" type="date" />
          </div>
          <div>
            <label>Currency</label>
            <select id="currency">
              <option value="A$">AUD - A$</option>
              <option value="$">USD - $</option>
              <option value="₹">INR - ₹</option>
            </select>
          </div>
        </div>
      </div>

      <div class="card">
        <h2>Your Business</h2>
        <div class="grid">
          <div>
            <label>Name</label>
            <input id="fromName" type="text" value="Narasimhareddy" />
          </div>
          <div>
            <label>ABN</label>
            <input id="fromAbn" type="text" value="30417964825" />
          </div>
          <div>
            <label>Address</label>
            <textarea id="fromAddress">1178 hay st west perth, 6005</textarea>
          </div>
        </div>
      </div>

      <div class="card">
        <h2>Bill To</h2>
        <div class="grid">
          <div>
            <label>Client Name</label>
            <input id="clientName" type="text" value="Sign Telecommunication" />
          </div>
          <div>
            <label>Client ABN</label>
            <input id="clientAbn" type="text" value="716697763" />
          </div>
        </div>
      </div>

      <div class="card">
        <h2>Add Item</h2>
        <div class="grid two">
          <div>
            <label>Date</label>
            <input id="itemDate" type="date" />
          </div>
          <div>
            <label>Item</label>
            <input id="itemName" type="text" placeholder="BRQ 75333" />
          </div>
          <div>
            <label>Quantity</label>
            <input id="itemQty" type="number" min="0" step="0.01" value="1" />
          </div>
          <div>
            <label>Rate</label>
            <input id="itemRate" type="number" min="0" step="0.01" placeholder="350" />
          </div>
          <div>
            <label>Category</label>
            <select id="itemCategory">
              <option value="monthly">Monthly GST + SUPER</option>
              <option value="nonmonthly">Non-monthly / No GST + SUPER</option>
            </select>
          </div>
        </div>
        <div class="row-actions">
          <button class="btn-primary btn-wide" onclick="addItem()">Add Item</button>
        </div>
      </div>

      <div class="card">
        <h2>Invoice Items</h2>
        <div id="itemsList"></div>
      </div>

      <div class="card">
        <h2>Totals</h2>
        <div id="totalsBox" class="totals"></div>
      </div>
    </section>

    <section id="history" class="section">
      <div class="card">
        <h2>Saved Invoices</h2>
        <div id="savedList"></div>
        <div class="row-actions">
          <button class="btn-danger btn-wide" onclick="clearAllSaved()">Clear All Saved Invoices</button>
        </div>
      </div>
    </section>

    <section id="analysis" class="section">
      <div class="card">
        <h2>Saved Invoice Analysis</h2>
        <div id="analysisBox"></div>
      </div>
    </section>
  </div>

  <div class="bottom-actions">
    <div class="bottom-inner">
      <button class="btn-secondary" onclick="exportInvoice(false)">Export</button>
      <button class="btn-primary" onclick="exportInvoice(true)">Export & Save</button>
    </div>
  </div>

  <script>
    const GST_RATE = 0.10;
    const SUPER_RATE = 0.12;
    let items = [];

    function todayISO() {
      return new Date().toISOString().slice(0, 10);
    }

    document.getElementById('invoiceDate').value = todayISO();
    document.getElementById('dueDate').value = todayISO();
    document.getElementById('itemDate').value = todayISO();
    document.getElementById('invoiceNumber').value = getNextInvoiceNumber();

    function showTab(tabName) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById(tabName).classList.add('active');
      event.target.classList.add('active');
      renderSaved();
      renderAnalysis();
    }

    function money(value) {
      const symbol = document.getElementById('currency').value || 'A$';
      const n = Number(value || 0);
      return symbol + n.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function calcItem(item) {
      const amount = Number(item.qty) * Number(item.rate);
      const gst = item.category === 'monthly' ? amount * GST_RATE : 0;
      const superAmount = item.category === 'monthly' ? amount * SUPER_RATE : 0;
      const total = amount + gst + superAmount;
      return { amount, gst, superAmount, total };
    }

    function calcTotals(sourceItems = items) {
      return sourceItems.reduce((acc, item) => {
        const c = calcItem(item);
        if (item.category === 'monthly') {
          acc.monthlySubtotal += c.amount;
          acc.gst += c.gst;
          acc.superAmount += c.superAmount;
          acc.monthlyTotal += c.total;
        } else {
          acc.nonMonthlySubtotal += c.amount;
          acc.nonMonthlyTotal += c.total;
        }
        acc.earnedBeforeGstSuper += c.amount;
        acc.grandTotal += c.total;
        return acc;
      }, {
        monthlySubtotal: 0,
        gst: 0,
        superAmount: 0,
        monthlyTotal: 0,
        nonMonthlySubtotal: 0,
        nonMonthlyTotal: 0,
        earnedBeforeGstSuper: 0,
        grandTotal: 0
      });
    }

    function addItem() {
      const date = document.getElementById('itemDate').value;
      const name = document.getElementById('itemName').value.trim();
      const qty = parseFloat(document.getElementById('itemQty').value);
      const rate = parseFloat(document.getElementById('itemRate').value);
      const category = document.getElementById('itemCategory').value;

      if (!date || !name || !qty || isNaN(rate)) {
        showMessage('Please enter Date, Item, Quantity and Rate.', false);
        return;
      }

      items.push({ id: Date.now(), date, name, qty, rate, category });
      document.getElementById('itemName').value = '';
      document.getElementById('itemQty').value = 1;
      document.getElementById('itemRate').value = '';
      renderItems();
      renderTotals();
      showMessage('Item added.', true);
    }

    function removeItem(id) {
      items = items.filter(item => item.id !== id);
      renderItems();
      renderTotals();
    }

    function renderItems() {
      const box = document.getElementById('itemsList');
      if (!items.length) {
        box.innerHTML = '<div class="empty">No items added yet.</div>';
        return;
      }

      box.innerHTML = items.map(item => {
        const c = calcItem(item);
        const badgeClass = item.category === 'monthly' ? 'monthly' : 'nonmonthly';
        const badgeText = item.category === 'monthly' ? 'GST + SUPER' : 'No GST/SUPER';
        return `
          <div class="item-card">
            <div class="item-head">
              <div>
                <p class="item-title">${escapeHTML(item.name)}</p>
                <span class="subtitle">${formatDate(item.date)}</span>
              </div>
              <span class="badge ${badgeClass}">${badgeText}</span>
            </div>
            <div class="mini-grid">
              <div class="mini"><span>Quantity</span><strong>${item.qty}</strong></div>
              <div class="mini"><span>Rate</span><strong>${money(item.rate)}</strong></div>
              <div class="mini"><span>Amount</span><strong>${money(c.amount)}</strong></div>
              <div class="mini"><span>GST</span><strong>${money(c.gst)}</strong></div>
              <div class="mini"><span>SUPER</span><strong>${money(c.superAmount)}</strong></div>
              <div class="mini"><span>Total</span><strong>${money(c.total)}</strong></div>
            </div>
            <div class="row-actions">
              <button class="btn-danger" onclick="removeItem(${item.id})">Remove</button>
            </div>
          </div>`;
      }).join('');
    }

    function renderTotals() {
      const t = calcTotals();
      document.getElementById('totalsBox').innerHTML = `
        <div class="total-row"><span>Monthly GST + SUPER Subtotal</span><strong>${money(t.monthlySubtotal)}</strong></div>
        <div class="total-row"><span>GST 10%</span><strong>${money(t.gst)}</strong></div>
        <div class="total-row"><span>SUPER 12%</span><strong>${money(t.superAmount)}</strong></div>
        <div class="total-row"><span>Monthly Total Including GST + SUPER</span><strong>${money(t.monthlyTotal)}</strong></div>
        <div class="total-row"><span>Non-monthly Subtotal</span><strong>${money(t.nonMonthlySubtotal)}</strong></div>
        <div class="grand">
          <div class="total-row"><span>Grand Total</span><strong>${money(t.grandTotal)}</strong></div>
        </div>`;
    }

    function getInvoiceData() {
      return {
        invoiceNumber: document.getElementById('invoiceNumber').value.trim() || '1',
        invoiceDate: document.getElementById('invoiceDate').value,
        dueDate: document.getElementById('dueDate').value,
        currency: document.getElementById('currency').value,
        fromName: document.getElementById('fromName').value.trim(),
        fromAbn: document.getElementById('fromAbn').value.trim(),
        fromAddress: document.getElementById('fromAddress').value.trim(),
        clientName: document.getElementById('clientName').value.trim(),
        clientAbn: document.getElementById('clientAbn').value.trim(),
        items: [...items],
        totals: calcTotals(),
        savedAt: new Date().toISOString()
      };
    }

    function validateInvoice() {
      if (!items.length) {
        showMessage('Please add at least one invoice item before exporting.', false);
        return false;
      }
      if (!document.getElementById('fromName').value.trim() || !document.getElementById('clientName').value.trim()) {
        showMessage('Please enter your business name and client name.', false);
        return false;
      }
      return true;
    }

    async function exportInvoice(saveToo) {
      if (!validateInvoice()) return;
      const data = getInvoiceData();
      if (saveToo) saveInvoice(data);
      generatePDF(data);
      showMessage(saveToo ? 'Invoice exported and saved.' : 'Invoice exported only. It was not saved.', true);
      renderSaved();
      renderAnalysis();
    }

    function generatePDF(data) {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ unit: 'pt', format: 'a4' });
      const pageWidth = doc.internal.pageSize.getWidth();
      const pageHeight = doc.internal.pageSize.getHeight();
      let y = 44;
      const left = 40;
      const right = pageWidth - 40;

      function pdfMoney(value) {
        const n = Number(value || 0);
        return data.currency + n.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      }

      function addText(text, x, yy, size = 10, style = 'normal', align = 'left') {
        doc.setFont('helvetica', style);
        doc.setFontSize(size);
        doc.text(String(text || ''), x, yy, { align });
      }

      function line(yy) {
        doc.setDrawColor(220, 225, 232);
        doc.line(left, yy, right, yy);
      }

      function checkPage(extra = 70) {
        if (y + extra > pageHeight - 50) {
          doc.addPage();
          y = 44;
        }
      }

      addText('INVOICE', left, y, 24, 'bold');
      addText('# ' + data.invoiceNumber, right, y, 14, 'bold', 'right');
      y += 28;
      line(y);
      y += 24;

      addText(data.fromName, left, y, 12, 'bold');
      y += 16;
      addText('ABN: ' + data.fromAbn, left, y, 10);
      y += 14;
      data.fromAddress.split('\n').forEach(part => {
        addText(part, left, y, 10);
        y += 14;
      });

      const topInfoY = 96;
      addText('Date: ' + formatDate(data.invoiceDate), right, topInfoY, 10, 'normal', 'right');
      addText('Due Date: ' + formatDate(data.dueDate), right, topInfoY + 16, 10, 'normal', 'right');
      addText('Balance Due: ' + pdfMoney(data.totals.grandTotal), right, topInfoY + 36, 12, 'bold', 'right');

      y += 14;
      addText('Bill To:', left, y, 11, 'bold');
      y += 16;
      addText(data.clientName, left, y, 10);
      y += 14;
      addText('ABN: ' + data.clientAbn, left, y, 10);
      y += 24;

      function itemTable(title, category) {
        const filtered = data.items.filter(i => i.category === category);
        if (!filtered.length) return;
        checkPage(100);
        addText(title, left, y, 13, 'bold');
        y += 18;
        line(y);
        y += 16;
        addText('Date', left, y, 9, 'bold');
        addText('Item', left + 70, y, 9, 'bold');
        addText('Qty', right - 230, y, 9, 'bold');
        addText('Rate', right - 180, y, 9, 'bold');
        addText('GST', right - 120, y, 9, 'bold');
        addText('SUPER', right - 70, y, 9, 'bold');
        addText('Total', right, y, 9, 'bold', 'right');
        y += 12;
        line(y);
        y += 16;

        filtered.forEach(item => {
          checkPage(50);
          const c = calcItem(item);
          const itemText = item.name.length > 22 ? item.name.slice(0, 21) + '…' : item.name;
          addText(formatDate(item.date), left, y, 9);
          addText(itemText, left + 70, y, 9);
          addText(item.qty, right - 230, y, 9);
          addText(pdfMoney(item.rate), right - 180, y, 9);
          addText(pdfMoney(c.gst), right - 120, y, 9);
          addText(pdfMoney(c.superAmount), right - 70, y, 9);
          addText(pdfMoney(c.total), right, y, 9, 'normal', 'right');
          y += 18;
        });
        y += 10;
      }

      itemTable('Monthly GST + SUPER Items', 'monthly');
      itemTable('Non-monthly / No GST + SUPER Items', 'nonmonthly');

      checkPage(170);
      y += 6;
      line(y);
      y += 22;
      const labelX = right - 245;
      const amountX = right;
      const rows = [
        ['Monthly Subtotal', data.totals.monthlySubtotal],
        ['GST 10%', data.totals.gst],
        ['SUPER 12%', data.totals.superAmount],
        ['Monthly Total Including GST + SUPER', data.totals.monthlyTotal],
        ['Non-monthly Subtotal', data.totals.nonMonthlySubtotal],
        ['Total Earned Before GST + SUPER', data.totals.earnedBeforeGstSuper]
      ];
      rows.forEach(([label, value]) => {
        addText(label, labelX, y, 10);
        addText(pdfMoney(value), amountX, y, 10, 'normal', 'right');
        y += 17;
      });
      line(y);
      y += 22;
      addText('Grand Total', labelX, y, 13, 'bold');
      addText(pdfMoney(data.totals.grandTotal), amountX, y, 13, 'bold', 'right');

      y += 36;
      checkPage(60);
      addText('Analysis', left, y, 12, 'bold');
      y += 18;
      addText('Earned before GST + SUPER: ' + pdfMoney(data.totals.earnedBeforeGstSuper), left, y, 10);
      y += 14;
      addText('GST collected: ' + pdfMoney(data.totals.gst), left, y, 10);
      y += 14;
      addText('SUPER amount: ' + pdfMoney(data.totals.superAmount), left, y, 10);
      y += 14;
      addText('Grand invoice amount: ' + pdfMoney(data.totals.grandTotal), left, y, 10);

      doc.save('Invoice_' + data.invoiceNumber + '.pdf');
    }

    function saveInvoice(data) {
      const saved = getSavedInvoices();
      saved.unshift(data);
      localStorage.setItem('mobileInvoices', JSON.stringify(saved));
      document.getElementById('invoiceNumber').value = getNextInvoiceNumber();
    }

    function getSavedInvoices() {
      try {
        return JSON.parse(localStorage.getItem('mobileInvoices') || '[]');
      } catch {
        return [];
      }
    }

    function getNextInvoiceNumber() {
      const saved = getSavedInvoices();
      if (!saved.length) return '60';
      const nums = saved.map(i => parseInt(i.invoiceNumber, 10)).filter(n => !isNaN(n));
      return String(nums.length ? Math.max(...nums) + 1 : saved.length + 60);
    }

    function renderSaved() {
      const box = document.getElementById('savedList');
      if (!box) return;
      const saved = getSavedInvoices();
      if (!saved.length) {
        box.innerHTML = '<div class="empty">No saved invoices yet. Use Export & Save to store invoices here.</div>';
        return;
      }
      box.innerHTML = saved.map((inv, idx) => `
        <div class="saved-card">
          <h3>Invoice #${escapeHTML(inv.invoiceNumber)}</h3>
          <div class="saved-meta">${escapeHTML(inv.clientName)} · ${formatDate(inv.invoiceDate)} · ${inv.items.length} item(s)</div>
          <div class="total-row"><span>GST</span><strong>${savedMoney(inv, inv.totals.gst)}</strong></div>
          <div class="total-row"><span>SUPER</span><strong>${savedMoney(inv, inv.totals.superAmount)}</strong></div>
          <div class="total-row"><span>Grand Total</span><strong>${savedMoney(inv, inv.totals.grandTotal)}</strong></div>
          <div class="row-actions">
            <button class="btn-secondary" onclick="loadSaved(${idx})">Load</button>
            <button class="btn-primary" onclick="generatePDF(getSavedInvoices()[${idx}])">Export PDF</button>
            <button class="btn-danger" onclick="deleteSaved(${idx})">Delete</button>
          </div>
        </div>`).join('');
    }

    function savedMoney(inv, value) {
      const n = Number(value || 0);
      return (inv.currency || 'A$') + n.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function loadSaved(index) {
      const inv = getSavedInvoices()[index];
      if (!inv) return;
      document.getElementById('invoiceNumber').value = inv.invoiceNumber;
      document.getElementById('invoiceDate').value = inv.invoiceDate;
      document.getElementById('dueDate').value = inv.dueDate;
      document.getElementById('currency').value = inv.currency || 'A$';
      document.getElementById('fromName').value = inv.fromName || '';
      document.getElementById('fromAbn').value = inv.fromAbn || '';
      document.getElementById('fromAddress').value = inv.fromAddress || '';
      document.getElementById('clientName').value = inv.clientName || '';
      document.getElementById('clientAbn').value = inv.clientAbn || '';
      items = inv.items || [];
      renderItems();
      renderTotals();
      showTabByName('create');
      showMessage('Saved invoice loaded. You can edit or export it.', true);
    }

    function deleteSaved(index) {
      const saved = getSavedInvoices();
      saved.splice(index, 1);
      localStorage.setItem('mobileInvoices', JSON.stringify(saved));
      renderSaved();
      renderAnalysis();
    }

    function clearAllSaved() {
      if (!confirm('Delete all saved invoices from this browser?')) return;
      localStorage.removeItem('mobileInvoices');
      renderSaved();
      renderAnalysis();
    }

    function renderAnalysis() {
      const box = document.getElementById('analysisBox');
      if (!box) return;
      const saved = getSavedInvoices();
      if (!saved.length) {
        box.innerHTML = '<div class="empty">No analysis yet. Save invoices to build your income, GST and SUPER totals.</div>';
        return;
      }
      const currency = saved[0].currency || 'A$';
      const sum = saved.reduce((acc, inv) => {
        acc.invoices += 1;
        acc.items += inv.items.length;
        acc.monthlySubtotal += inv.totals.monthlySubtotal;
        acc.gst += inv.totals.gst;
        acc.superAmount += inv.totals.superAmount;
        acc.nonMonthlySubtotal += inv.totals.nonMonthlySubtotal;
        acc.earnedBeforeGstSuper += inv.totals.earnedBeforeGstSuper;
        acc.grandTotal += inv.totals.grandTotal;
        return acc;
      }, { invoices: 0, items: 0, monthlySubtotal: 0, gst: 0, superAmount: 0, nonMonthlySubtotal: 0, earnedBeforeGstSuper: 0, grandTotal: 0 });

      function m(v) {
        return currency + Number(v || 0).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      }

      box.innerHTML = `
        <div class="total-row"><span>Saved Invoices</span><strong>${sum.invoices}</strong></div>
        <div class="total-row"><span>Total Items</span><strong>${sum.items}</strong></div>
        <div class="total-row"><span>Monthly Income Before GST + SUPER</span><strong>${m(sum.monthlySubtotal)}</strong></div>
        <div class="total-row"><span>Total GST</span><strong>${m(sum.gst)}</strong></div>
        <div class="total-row"><span>Total SUPER</span><strong>${m(sum.superAmount)}</strong></div>
        <div class="total-row"><span>Non-monthly Income</span><strong>${m(sum.nonMonthlySubtotal)}</strong></div>
        <div class="total-row"><span>Total Earned Before GST + SUPER</span><strong>${m(sum.earnedBeforeGstSuper)}</strong></div>
        <div class="grand">
          <div class="total-row"><span>Grand Total Invoice Amount</span><strong>${m(sum.grandTotal)}</strong></div>
        </div>`;
    }

    function showTabByName(tabName) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById(tabName).classList.add('active');
      const tabs = document.querySelectorAll('.tab');
      if (tabName === 'create') tabs[0].classList.add('active');
      if (tabName === 'history') tabs[1].classList.add('active');
      if (tabName === 'analysis') tabs[2].classList.add('active');
    }

    function formatDate(value) {
      if (!value) return '';
      const d = new Date(value + 'T00:00:00');
      if (isNaN(d)) return value;
      return d.toLocaleDateString('en-AU');
    }

    function escapeHTML(str) {
      return String(str || '').replace(/[&<>'"]/g, ch => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
      }[ch]));
    }

    function showMessage(text, ok) {
      const box = document.getElementById('message');
      box.innerHTML = `<div class="notice ${ok ? 'success' : ''}">${escapeHTML(text)}</div>`;
      setTimeout(() => { box.innerHTML = ''; }, 3500);
    }

    renderItems();
    renderTotals();
    renderSaved();
    renderAnalysis();
  </script>
</body>
</html>
